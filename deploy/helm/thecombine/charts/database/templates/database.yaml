# Defines the following Kubernetes resources for The Combine:
#  - PersistentVolumeClaim/database-data
#  - Deployment/database
#  - Service/database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  name: database-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistentVolumeSize }}
status: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    combine-component: database
  name: database
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      combine-component: database
  strategy:
    type: {{ .Values.global.updateStrategy }}
{{- if eq "RollingUpdate" .Values.global.updateStrategy  }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
{{- end }}
  template:
    metadata:
      creationTimestamp: null
      labels:
        combine-component: database
    spec:
      containers:
        - image: {{ include "database.containerImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          name: database
          args:
            - "--replSet"
            - "rs0"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -e
                    echo "[postStart] Waiting for mongod to accept connections"
                    attempts=0
                    until mongosh --quiet --host 127.0.0.1 --eval "db.adminCommand({ ping: 1 }).ok" >/dev/null 2>&1; do
                      attempts=$((attempts + 1))
                      if [ "${attempts}" -ge 120 ]; then
                        exit 1
                      fi
                      sleep 1
                    done
                    echo "[postStart] Ensuring replica set host"
                    mongosh --quiet --host 127.0.0.1 /opt/thecombine/00-replica-set.js || exit $?
                    needs_semantic_import="$(mongosh --quiet --host 127.0.0.1 --eval "const combineDb = db.getSiblingDB('CombineDatabase'); const treeCount = combineDb.SemanticDomainTree.countDocuments({}); const domainCount = combineDb.SemanticDomains.countDocuments({}); print(treeCount === 0 || domainCount === 0 ? 'yes' : 'no');")"
                    if [ "${needs_semantic_import}" = "yes" ]; then
                      /bin/bash /opt/thecombine/update-semantic-domains.sh
                    fi
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MONGO_INITDB_REPLICA_HOST
              value: "$(POD_IP):27017"
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu:  25m
              memory: 1Gi
{{- if .Values.global.includeResourceLimits }}
            limits:
              memory: 2Gi
{{- end }}
          volumeMounts:
            - mountPath: /data/db
              name: database-data
      restartPolicy: Always
{{- if ne .Values.global.pullSecretName "None" }}
      imagePullSecrets:
         - name: {{ .Values.global.pullSecretName }}
{{- end }}
      volumes:
        - name: database-data
          persistentVolumeClaim:
            claimName: database-data
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    combine-component: database
  name: database
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "27017"
      port: 27017
      targetPort: 27017
  selector:
    combine-component: database
status:
  loadBalancer: {}
