# Defines the following Kubernetes resources for The Combine:
#  - PersistentVolumeClaim/database-data
#  - Deployment/database
#  - Service/database
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  creationTimestamp: null
  name: database-data
  namespace: {{ .Release.Namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.persistentVolumeSize }}
status: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  creationTimestamp: null
  labels:
    combine-component: database
  name: database
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      combine-component: database
  strategy:
    type: {{ .Values.global.updateStrategy }}
{{- if eq "RollingUpdate" .Values.global.updateStrategy  }}
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
{{- end }}
  template:
    metadata:
      creationTimestamp: null
      labels:
        combine-component: database
    spec:
      containers:
        - image: {{ include "database.containerImage" . }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          name: database
          args:
            - "--replSet"
            - "rs0"
          lifecycle:
            postStart:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    set -e
                    max_attempts=60
                    attempt=1
                    while [ "$attempt" -le "$max_attempts" ]; do
                      if mongosh --quiet --host 127.0.0.1 --eval "const host = '${MONGO_INITDB_REPLICA_HOST}'; try { rs.status(); print('Replica set already initialized'); } catch (e) { print('Initializing replica set (' + e + ')'); rs.initiate({_id: 'rs0', members: [{_id: 0, host: host}]}); }" ; then
                        exit 0
                      fi
                      sleep 1
                      attempt=$((attempt + 1))
                    done
                    echo "Failed to ensure replica set initialization after ${max_attempts} attempts"
                    exit 1
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: MONGO_INITDB_REPLICA_HOST
              value: "$(POD_IP):27017"
          ports:
            - containerPort: 27017
          resources:
            requests:
              cpu:  25m
              memory: 1Gi
{{- if .Values.global.includeResourceLimits }}
            limits:
              memory: 2Gi
{{- end }}
          volumeMounts:
            - mountPath: /data/db
              name: database-data
      restartPolicy: Always
{{- if ne .Values.global.pullSecretName "None" }}
      imagePullSecrets:
         - name: {{ .Values.global.pullSecretName }}
{{- end }}
      volumes:
        - name: database-data
          persistentVolumeClaim:
            claimName: database-data
status: {}
---
apiVersion: v1
kind: Service
metadata:
  creationTimestamp: null
  labels:
    combine-component: database
  name: database
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - name: "27017"
      port: 27017
      targetPort: 27017
  selector:
    combine-component: database
status:
  loadBalancer: {}
