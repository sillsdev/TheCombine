name: "Update combine_deploy image"

on:
  push:
    branches: [master]
    paths:
      - "deploy/**"

permissions: # added using https://github.com/step-security/secure-workflows
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # See https://docs.stepsecurity.io/harden-runner/getting-started/ for instructions on
      # configuring harden-runner and identifying allowed endpoints.
      - name: Harden Runner
        uses: step-security/harden-runner@fe104658747b27e96e4f7e80cd0a94068e53901d # v2.16.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.ecr-public.us-east-1.amazonaws.com:443
            archive.ubuntu.com:80
            auth.docker.io:443
            cdn.dl.k8s.io:443
            deb.debian.org:80
            dl.k8s.io:443
            files.pythonhosted.org:443
            get.helm.sh:443
            github.com:443
            production.cloudflare.docker.com:443
            public.ecr.aws:443
            pypi.org:443
            raw.githubusercontent.com:443
            registry-1.docker.io:443
            security.ubuntu.com:80
            sts.us-east-1.amazonaws.com:443
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to AWS ECR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: public.ecr.aws
          username: ${{ secrets.AWS_ACCESS_KEY_ID }}
          password: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Build combine_deploy
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: "{{defaultContext}}:deploy"
          push: true
          tags: public.ecr.aws/thecombine/combine_deploy:latest
      - name: Delete combine_deploy images older than 1 year
        shell: bash
        run: |
          set -euo pipefail
          CUTOFF=$(date -u -d '1 year ago' '+%Y-%m-%dT%H:%M:%SZ')
          OLD_DIGESTS=$(aws ecr-public describe-images \
            --region us-east-1 \
            --repository-name combine_deploy \
            --query "imageDetails[?imagePushedAt<'${CUTOFF}'].imageDigest" \
            --output text)
          OLD_COUNT=$(printf '%s' "${OLD_DIGESTS}" | awk '{print NF}')
          if [ -z "${OLD_DIGESTS}" ] || [ "${OLD_DIGESTS}" = "None" ] || [ "${OLD_COUNT}" -eq 0 ]; then
            echo "No images older than 1 year found."
            exit 0
          fi
          echo "Found ${OLD_COUNT} images older than 1 year. Deleting..."
          for digest in ${OLD_DIGESTS}; do
            echo "Deleting digest: ${digest}"
            aws ecr-public batch-delete-image \
              --region us-east-1 \
              --repository-name combine_deploy \
              --image-ids imageDigest=${digest}
          done
